<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 280" width="350" height="280">
  <defs>
    <linearGradient id="bc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162236"/>
      <stop offset="100%" stop-color="#0e1a2e"/>
    </linearGradient>
    <linearGradient id="bc-row-active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a20"/>
      <stop offset="100%" stop-color="#14291a"/>
    </linearGradient>
    <linearGradient id="bc-row-inactive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2438"/>
      <stop offset="100%" stop-color="#141c2c"/>
    </linearGradient>
    <!-- Mini resource icons as symbols -->
    <!-- Lumber mini -->
    <symbol id="res-lumber" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#2d5a1e" stroke="#3d7a2e" stroke-width="1"/>
      <rect x="6" y="8" width="12" height="4" rx="2" fill="#a67c2e" stroke="#5a3e0a" stroke-width="0.5"/>
      <ellipse cx="18" cy="10" rx="2" ry="2" fill="#8B6914" stroke="#5a3e0a" stroke-width="0.5"/>
      <rect x="8" y="12" width="10" height="4" rx="2" fill="#8B6914" stroke="#5a3e0a" stroke-width="0.5"/>
      <ellipse cx="8" cy="14" rx="2" ry="2" fill="#a67c2e" stroke="#5a3e0a" stroke-width="0.5"/>
    </symbol>
    <!-- Brick mini -->
    <symbol id="res-brick" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#7a3318" stroke="#c0623a" stroke-width="1"/>
      <rect x="5" y="8" width="6" height="4" rx="0.5" fill="#d4852e" stroke="#5a3308" stroke-width="0.4"/>
      <rect x="13" y="8" width="6" height="4" rx="0.5" fill="#d4852e" stroke="#5a3308" stroke-width="0.4"/>
      <rect x="9" y="13" width="6" height="4" rx="0.5" fill="#d4852e" stroke="#5a3308" stroke-width="0.4"/>
    </symbol>
    <!-- Wool mini -->
    <symbol id="res-wool" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#3a6a24" stroke="#7aaa4e" stroke-width="1"/>
      <ellipse cx="12" cy="12" rx="6" ry="5" fill="#f5f5f0"/>
      <circle cx="8" cy="10" r="2.5" fill="#ede8dc"/>
      <circle cx="12" cy="8" r="2.5" fill="#f0ebe0"/>
      <circle cx="16" cy="10" r="2.5" fill="#ede8dc"/>
      <ellipse cx="7" cy="12" rx="2" ry="1.5" fill="#2a2a2a"/>
      <circle cx="6.5" cy="11.5" r="0.6" fill="#fff"/>
    </symbol>
    <!-- Grain mini -->
    <symbol id="res-grain" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#917518" stroke="#dbb830" stroke-width="1"/>
      <line x1="12" y1="18" x2="12" y2="8" stroke="#8B7355" stroke-width="1"/>
      <ellipse cx="12" cy="7" rx="1.5" ry="2.5" fill="#fdd835"/>
      <ellipse cx="10" cy="9" rx="1.2" ry="2" fill="#fdd835" transform="rotate(15,10,9)"/>
      <ellipse cx="14" cy="9" rx="1.2" ry="2" fill="#fdd835" transform="rotate(-15,14,9)"/>
      <ellipse cx="12" cy="5" rx="1" ry="1.8" fill="#ecc526"/>
      <line x1="10" y1="18" x2="9" y2="10" stroke="#8B7355" stroke-width="0.8"/>
      <line x1="14" y1="18" x2="15" y2="10" stroke="#8B7355" stroke-width="0.8"/>
    </symbol>
    <!-- Ore mini -->
    <symbol id="res-ore" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#37474f" stroke="#78909c" stroke-width="1"/>
      <polygon points="12,5 8,12 10,11 12,14 14,11 16,12" fill="#90a4ae" stroke="#607d8b" stroke-width="0.4"/>
      <polygon points="9,8 6,14 9,13 12,16" fill="#78909c" stroke="#607d8b" stroke-width="0.3"/>
      <polygon points="15,8 18,14 15,13 12,16" fill="#78909c" stroke="#607d8b" stroke-width="0.3"/>
      <circle cx="11" cy="7" r="0.6" fill="#fff" opacity="0.7"/>
    </symbol>
  </defs>

  <!-- Panel background -->
  <rect x="0" y="0" width="350" height="280" rx="12" ry="12" fill="url(#bc-bg)" stroke="#2a3a52" stroke-width="1.5"/>

  <!-- Title -->
  <text x="175" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c8d8e8" font-weight="bold" letter-spacing="1">BUILDING COSTS</text>
  <line x1="40" y1="36" x2="310" y2="36" stroke="#2a3a52" stroke-width="1"/>

  <!-- Row 1: Settlement (affordable state shown) -->
  <rect x="12" y="44" width="326" height="50" rx="8" fill="url(#bc-row-active)" stroke="#2d6a30" stroke-width="1" opacity="0.9"/>
  <!-- Settlement icon -->
  <g transform="translate(36,62)">
    <polygon points="0,-10 -10,0 -8,0 -8,8 8,8 8,0 10,0" fill="#e5e5e5" stroke="#bbb" stroke-width="0.8"/>
  </g>
  <text x="56" y="66" font-family="Georgia, serif" font-size="11" fill="#c8e6c9" font-weight="bold">Settlement</text>
  <!-- Cost: lumber, brick, wool, grain -->
  <use href="#res-lumber" x="176" y="54" width="24" height="24"/>
  <use href="#res-brick" x="208" y="54" width="24" height="24"/>
  <use href="#res-wool" x="240" y="54" width="24" height="24"/>
  <use href="#res-grain" x="272" y="54" width="24" height="24"/>
  <!-- Checkmark for affordable -->
  <circle cx="316" cy="68" r="8" fill="#2d6a30" stroke="#4caf50" stroke-width="1"/>
  <polyline points="312,68 315,72 321,64" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 2: City (not affordable state) -->
  <rect x="12" y="100" width="326" height="50" rx="8" fill="url(#bc-row-inactive)" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
  <!-- City icon -->
  <g transform="translate(36,118)">
    <rect x="-8" y="-8" width="16" height="16" fill="#78909c" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="-4" y="-14" width="8" height="8" fill="#78909c" stroke="#607d8b" stroke-width="0.8"/>
    <rect x="-2" y="-18" width="4" height="6" fill="#78909c" stroke="#607d8b" stroke-width="0.8"/>
  </g>
  <text x="56" y="122" font-family="Georgia, serif" font-size="11" fill="#607888" font-weight="bold">City Upgrade</text>
  <!-- Cost: grain x2, ore x3 -->
  <use href="#res-grain" x="176" y="110" width="24" height="24" opacity="0.5"/>
  <use href="#res-grain" x="204" y="110" width="24" height="24" opacity="0.5"/>
  <use href="#res-ore" x="232" y="110" width="24" height="24" opacity="0.5"/>
  <use href="#res-ore" x="260" y="110" width="24" height="24" opacity="0.5"/>
  <use href="#res-ore" x="288" y="110" width="24" height="24" opacity="0.5"/>
  <!-- Lock for not affordable -->
  <circle cx="316" cy="124" r="8" fill="#1a2438" stroke="#455a64" stroke-width="1"/>
  <rect x="312" y="122" width="8" height="6" rx="1" fill="#455a64"/>
  <path d="M313,122 L313,120 Q316,117 319,120 L319,122" fill="none" stroke="#455a64" stroke-width="1"/>

  <!-- Row 3: Road (affordable) -->
  <rect x="12" y="156" width="326" height="50" rx="8" fill="url(#bc-row-active)" stroke="#2d6a30" stroke-width="1" opacity="0.9"/>
  <!-- Road icon -->
  <g transform="translate(36,174)">
    <rect x="-12" y="-3" width="24" height="6" rx="2" fill="#a1887f" stroke="#795548" stroke-width="0.8"/>
    <line x1="-8" y1="0" x2="-4" y2="0" stroke="#8d6e63" stroke-width="0.6" opacity="0.5"/>
    <line x1="0" y1="0" x2="4" y2="0" stroke="#8d6e63" stroke-width="0.6" opacity="0.5"/>
    <line x1="6" y1="0" x2="10" y2="0" stroke="#8d6e63" stroke-width="0.6" opacity="0.5"/>
  </g>
  <text x="56" y="178" font-family="Georgia, serif" font-size="11" fill="#c8e6c9" font-weight="bold">Road</text>
  <!-- Cost: lumber, brick -->
  <use href="#res-lumber" x="176" y="166" width="24" height="24"/>
  <use href="#res-brick" x="208" y="166" width="24" height="24"/>

  <circle cx="316" cy="180" r="8" fill="#2d6a30" stroke="#4caf50" stroke-width="1"/>
  <polyline points="312,180 315,184 321,176" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 4: Development Card (not affordable) -->
  <rect x="12" y="212" width="326" height="50" rx="8" fill="url(#bc-row-inactive)" stroke="#2a3a52" stroke-width="1" opacity="0.6"/>
  <!-- Dev card icon -->
  <g transform="translate(36,230)">
    <rect x="-8" y="-10" width="16" height="20" rx="2" fill="#4a1a6b" stroke="#7b3fa0" stroke-width="0.8"/>
    <text x="0" y="4" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#ce93d8" opacity="0.6">?</text>
  </g>
  <text x="56" y="234" font-family="Georgia, serif" font-size="11" fill="#607888" font-weight="bold">Dev Card</text>
  <!-- Cost: wool, grain, ore -->
  <use href="#res-wool" x="176" y="222" width="24" height="24" opacity="0.5"/>
  <use href="#res-grain" x="208" y="222" width="24" height="24" opacity="0.5"/>
  <use href="#res-ore" x="240" y="222" width="24" height="24" opacity="0.5"/>

  <circle cx="316" cy="236" r="8" fill="#1a2438" stroke="#455a64" stroke-width="1"/>
  <rect x="312" y="234" width="8" height="6" rx="1" fill="#455a64"/>
  <path d="M313,234 L313,232 Q316,229 319,232 L319,234" fill="none" stroke="#455a64" stroke-width="1"/>
</svg>