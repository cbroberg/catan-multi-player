<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 70" width="50" height="70">
  <defs>
    <linearGradient id="wool-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a8a3c"/>
      <stop offset="100%" stop-color="#3a6a24"/>
    </linearGradient>
    <filter id="wool-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="1" y="1" width="48" height="68" rx="5" ry="5" fill="url(#wool-bg)" stroke="#7aaa4e" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="4" y="4" width="42" height="62" rx="3" ry="3" fill="none" stroke="#7aaa4e" stroke-width="0.5" opacity="0.5"/>
  <!-- Grass texture background -->
  <g opacity="0.2">
    <path d="M8,60 Q9,56 10,60" stroke="#aed581" fill="none" stroke-width="0.8"/>
    <path d="M14,58 Q15,54 16,58" stroke="#aed581" fill="none" stroke-width="0.8"/>
    <path d="M20,60 Q21,56 22,60" stroke="#aed581" fill="none" stroke-width="0.8"/>
    <path d="M28,59 Q29,55 30,59" stroke="#aed581" fill="none" stroke-width="0.8"/>
    <path d="M34,60 Q35,56 36,60" stroke="#aed581" fill="none" stroke-width="0.8"/>
    <path d="M40,58 Q41,54 42,58" stroke="#aed581" fill="none" stroke-width="0.8"/>
  </g>
  <!-- Sheep icon -->
  <g transform="translate(25,28)" filter="url(#wool-shadow)">
    <!-- Body (fluffy wool) -->
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#f5f5f0"/>
    <!-- Wool bumps -->
    <circle cx="-8" cy="-4" r="4" fill="#ede8dc"/>
    <circle cx="-3" cy="-7" r="4.5" fill="#f0ebe0"/>
    <circle cx="4" cy="-6" r="4" fill="#ede8dc"/>
    <circle cx="9" cy="-3" r="3.5" fill="#f0ebe0"/>
    <circle cx="8" cy="3" r="3.5" fill="#ede8dc"/>
    <circle cx="-8" cy="3" r="3.5" fill="#ede8dc"/>
    <circle cx="0" cy="-8" r="3" fill="#ede8dc"/>
    <!-- Head -->
    <ellipse cx="-13" cy="-2" rx="4.5" ry="4" fill="#2a2a2a"/>
    <!-- Eye -->
    <circle cx="-14" cy="-3" r="1.2" fill="#fff"/>
    <circle cx="-14.3" cy="-3.2" r="0.6" fill="#111"/>
    <!-- Ear -->
    <ellipse cx="-16" cy="-5" rx="2" ry="1.2" fill="#3a3a3a" transform="rotate(-20,-16,-5)"/>
    <!-- Legs -->
    <rect x="-7" y="7" width="2" height="6" rx="0.5" fill="#2a2a2a"/>
    <rect x="-2" y="7" width="2" height="6" rx="0.5" fill="#2a2a2a"/>
    <rect x="3" y="7" width="2" height="6" rx="0.5" fill="#2a2a2a"/>
    <rect x="7" y="7" width="2" height="6" rx="0.5" fill="#2a2a2a"/>
  </g>
  <!-- Label -->
  <text x="25" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#dcedc8" font-weight="bold" letter-spacing="0.5">WOOL</text>
  <!-- Count badge -->
  <circle cx="41" cy="10" r="7" fill="#2e5016" stroke="#8bc34a" stroke-width="1"/>
  <text x="41" y="13" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#e8f5e9" font-weight="bold">0</text>
  <!-- Dot pattern for colorblind -->
  <circle cx="6" cy="64" r="0.8" fill="#7aaa4e" opacity="0.5"/>
  <circle cx="10" cy="64" r="0.8" fill="#7aaa4e" opacity="0.5"/>
  <circle cx="14" cy="64" r="0.8" fill="#7aaa4e" opacity="0.5"/>
  <circle cx="18" cy="64" r="0.8" fill="#7aaa4e" opacity="0.5"/>
</svg>