<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <defs>
    <linearGradient id="vp-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4a1a6b"/>
      <stop offset="100%" stop-color="#2a0e40"/>
    </linearGradient>
    <linearGradient id="crown-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="50%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#e09000"/>
    </linearGradient>
    <filter id="vp-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vp-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="1" y="1" width="58" height="78" rx="6" ry="6" fill="url(#vp-bg)" stroke="#7b3fa0" stroke-width="1.5"/>
  <rect x="4" y="4" width="52" height="72" rx="4" ry="4" fill="none" stroke="#9c27b0" stroke-width="0.5" opacity="0.4"/>
  <!-- Corner flourishes -->
  <path d="M8,8 Q12,8 12,12" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <path d="M52,8 Q48,8 48,12" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <path d="M8,72 Q12,72 12,68" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <path d="M52,72 Q48,72 48,68" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <!-- Sparkle particles -->
  <circle cx="15" cy="20" r="0.8" fill="#ffd54f" opacity="0.5"/>
  <circle cx="46" cy="26" r="0.6" fill="#ffd54f" opacity="0.4"/>
  <circle cx="12" cy="48" r="0.5" fill="#ce93d8" opacity="0.3"/>
  <circle cx="50" cy="42" r="0.7" fill="#ffd54f" opacity="0.4"/>
  <!-- Crown + Castle icon -->
  <g transform="translate(30,30)" filter="url(#vp-shadow)">
    <!-- Castle base -->
    <rect x="-12" y="2" width="24" height="12" rx="1" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.6"/>
    <!-- Castle door -->
    <path d="M-3,14 L-3,7 Q0,4 3,7 L3,14 Z" fill="#2a0e40" stroke="#7b3fa0" stroke-width="0.4"/>
    <!-- Castle towers -->
    <rect x="-14" y="-4" width="6" height="8" rx="0.5" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.5"/>
    <rect x="8" y="-4" width="6" height="8" rx="0.5" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.5"/>
    <!-- Tower battlements -->
    <rect x="-14" y="-6" width="2" height="3" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.3"/>
    <rect x="-10" y="-6" width="2" height="3" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.3"/>
    <rect x="8" y="-6" width="2" height="3" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.3"/>
    <rect x="12" y="-6" width="2" height="3" fill="#5c2d82" stroke="#7b3fa0" stroke-width="0.3"/>
    <!-- Crown above castle -->
    <g transform="translate(0,-16)" filter="url(#vp-glow)">
      <path d="M-10,6 L-10,0 L-6,-4 L-3,0 L0,-6 L3,0 L6,-4 L10,0 L10,6 Z" fill="url(#crown-gold)" stroke="#e09000" stroke-width="0.6"/>
      <!-- Crown jewels -->
      <circle cx="0" cy="-3" r="1.2" fill="#e53935"/>
      <circle cx="-6" cy="-1" r="1" fill="#1e88e5"/>
      <circle cx="6" cy="-1" r="1" fill="#43a047"/>
      <!-- Crown band detail -->
      <rect x="-10" y="4" width="20" height="2" fill="#e09000" stroke="#c17900" stroke-width="0.3"/>
    </g>
    <!-- Tower windows -->
    <rect x="-13" y="-2" width="2" height="3" rx="1" fill="#ffd54f" opacity="0.5"/>
    <rect x="11" y="-2" width="2" height="3" rx="1" fill="#ffd54f" opacity="0.5"/>
  </g>
  <!-- Card title -->
  <text x="30" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" fill="#ffd54f" font-weight="bold">VICTORY POINT</text>
  <!-- Effect text -->
  <text x="30" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#9575cd" font-style="italic">+1 VP</text>
  <!-- Top label -->
  <text x="30" y="14" text-anchor="middle" font-family="Georgia, serif" font-size="4.5" fill="#7b3fa0" letter-spacing="2" font-weight="bold">DEVELOPMENT</text>
</svg>