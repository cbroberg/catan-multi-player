<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 70" width="50" height="70">
  <defs>
    <linearGradient id="ore-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="crystal-face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90a4ae"/>
      <stop offset="40%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#78909c"/>
    </linearGradient>
    <linearGradient id="crystal-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfd8dc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#78909c" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="ore-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.4"/>
    </filter>
    <filter id="ore-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="1" y="1" width="48" height="68" rx="5" ry="5" fill="url(#ore-bg)" stroke="#78909c" stroke-width="1.5"/>
  <!-- Inner border -->
  <rect x="4" y="4" width="42" height="62" rx="3" ry="3" fill="none" stroke="#78909c" stroke-width="0.5" opacity="0.5"/>
  <!-- Rock texture background -->
  <g opacity="0.12">
    <polygon points="6,60 10,56 14,60" fill="#b0bec5"/>
    <polygon points="18,58 22,54 26,58" fill="#b0bec5"/>
    <polygon points="32,60 36,56 40,60" fill="#b0bec5"/>
  </g>
  <!-- Crystal cluster icon -->
  <g transform="translate(25,28)" filter="url(#ore-shadow)">
    <!-- Rock base -->
    <path d="M-14,10 L-12,4 L-4,6 L4,4 L12,6 L14,10 Z" fill="#546e7a" stroke="#37474f" stroke-width="0.8"/>
    <!-- Large center crystal -->
    <polygon points="0,-16 -5,4 0,2 5,4" fill="url(#crystal-face)" stroke="#607d8b" stroke-width="0.6"/>
    <polygon points="0,-16 0,2 5,4" fill="url(#crystal-shine)"/>
    <!-- Left crystal -->
    <polygon points="-8,-10 -12,4 -8,3 -4,5" fill="#78909c" stroke="#607d8b" stroke-width="0.5"/>
    <polygon points="-8,-10 -8,3 -4,5" fill="#90a4ae" opacity="0.7"/>
    <!-- Right crystal -->
    <polygon points="7,-8 3,5 7,3 11,5" fill="#78909c" stroke="#607d8b" stroke-width="0.5"/>
    <polygon points="7,-8 7,3 11,5" fill="#90a4ae" opacity="0.7"/>
    <!-- Small crystal left -->
    <polygon points="-11,-4 -13,4 -11,3 -9,4" fill="#90a4ae" stroke="#607d8b" stroke-width="0.4"/>
    <!-- Small crystal right -->
    <polygon points="11,-3 9,5 11,4 13,5" fill="#90a4ae" stroke="#607d8b" stroke-width="0.4"/>
    <!-- Sparkle highlights -->
    <circle cx="-1" cy="-10" r="0.8" fill="#fff" opacity="0.8"/>
    <circle cx="6" cy="-4" r="0.5" fill="#fff" opacity="0.6"/>
    <circle cx="-7" cy="-6" r="0.5" fill="#fff" opacity="0.6"/>
  </g>
  <!-- Label -->
  <text x="25" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#cfd8dc" font-weight="bold" letter-spacing="0.5">ORE</text>
  <!-- Count badge -->
  <circle cx="41" cy="10" r="7" fill="#263238" stroke="#90a4ae" stroke-width="1"/>
  <text x="41" y="13" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#eceff1" font-weight="bold">0</text>
  <!-- Triangle pattern for colorblind -->
  <polygon points="6,63 8,65 10,63" fill="#78909c" opacity="0.4"/>
  <polygon points="12,63 14,65 16,63" fill="#78909c" opacity="0.4"/>
  <polygon points="18,63 20,65 22,63" fill="#78909c" opacity="0.4"/>
</svg>