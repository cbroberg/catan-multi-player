<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <defs>
    <linearGradient id="mono-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4a1a6b"/>
      <stop offset="100%" stop-color="#2a0e40"/>
    </linearGradient>
    <linearGradient id="bag-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a825"/>
      <stop offset="50%" stop-color="#e0c040"/>
      <stop offset="100%" stop-color="#a08520"/>
    </linearGradient>
    <filter id="mono-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Card body -->
  <rect x="1" y="1" width="58" height="78" rx="6" ry="6" fill="url(#mono-bg)" stroke="#7b3fa0" stroke-width="1.5"/>
  <rect x="4" y="4" width="52" height="72" rx="4" ry="4" fill="none" stroke="#9c27b0" stroke-width="0.5" opacity="0.4"/>
  <!-- Corner flourishes -->
  <path d="M8,8 Q12,8 12,12" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <path d="M52,8 Q48,8 48,12" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <path d="M8,72 Q12,72 12,68" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <path d="M52,72 Q48,72 48,68" fill="none" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
  <!-- Particles -->
  <circle cx="12" cy="20" r="0.6" fill="#ffd54f" opacity="0.4"/>
  <circle cx="48" cy="26" r="0.8" fill="#ce93d8" opacity="0.3"/>
  <!-- Money bag icon -->
  <g transform="translate(30,28)" filter="url(#mono-shadow)">
    <!-- Bag body -->
    <path d="M-12,14 Q-14,2 -8,-4 L-4,-6 Q0,-8 4,-6 L8,-4 Q14,2 12,14 Z" fill="url(#bag-body)" stroke="#8a6d14" stroke-width="0.8"/>
    <!-- Bag tie/neck -->
    <path d="M-4,-6 Q-2,-4 0,-6 Q2,-4 4,-6" stroke="#8a6d14" stroke-width="1" fill="none"/>
    <!-- Bag top (gathered) -->
    <path d="M-4,-6 Q-6,-10 -2,-14 Q0,-16 2,-14 Q6,-10 4,-6" fill="#c9a825" stroke="#8a6d14" stroke-width="0.6"/>
    <!-- Dollar/coin symbol on bag -->
    <text x="0" y="8" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8a6d14" font-weight="bold" opacity="0.6">$</text>
    <!-- Bag texture lines -->
    <path d="M-8,2 Q0,0 8,2" stroke="#a08520" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M-10,8 Q0,6 10,8" stroke="#a08520" stroke-width="0.4" fill="none" opacity="0.5"/>
    <!-- Coins scattered around -->
    <circle cx="-10" cy="12" r="3" fill="#ffd54f" stroke="#e09000" stroke-width="0.5"/>
    <circle cx="-10" cy="12" r="1.5" fill="#e09000" opacity="0.3"/>
    <circle cx="10" cy="10" r="2.5" fill="#ffd54f" stroke="#e09000" stroke-width="0.5"/>
    <circle cx="12" cy="14" r="2" fill="#ffd54f" stroke="#e09000" stroke-width="0.5"/>
    <!-- Crown above bag -->
    <g transform="translate(0,-18)">
      <path d="M-6,4 L-6,0 L-3,-3 L0,-1 L3,-3 L6,0 L6,4 Z" fill="#ffd54f" stroke="#e09000" stroke-width="0.5"/>
      <circle cx="0" cy="-0.5" r="0.8" fill="#e53935"/>
    </g>
    <!-- Sparkles -->
    <circle cx="-4" cy="-12" r="0.8" fill="#fff" opacity="0.6"/>
    <circle cx="6" cy="-8" r="0.6" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Card title -->
  <text x="30" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#ffd54f" font-weight="bold">MONOPOLY</text>
  <!-- Effect text -->
  <text x="30" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="4.5" fill="#9575cd" font-style="italic">Take all of one type</text>
  <!-- Top label -->
  <text x="30" y="14" text-anchor="middle" font-family="Georgia, serif" font-size="4.5" fill="#7b3fa0" letter-spacing="2" font-weight="bold">DEVELOPMENT</text>
</svg>