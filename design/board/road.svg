<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 10" width="40" height="10">
  <defs>
    <!-- PLAYER_COLOR: replace #ef4444 with player color -->
    <linearGradient id="road-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="road-shadow" x="-5%" y="-20%" width="110%" height="160%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#road-shadow)">
    <!-- Road body -->
    <rect x="2" y="2" width="36" height="6" rx="2" fill="url(#road-grad)"/>
    <!-- Top highlight -->
    <rect x="3" y="2.5" width="34" height="1.5" rx="1" fill="#fca5a5" opacity="0.2"/>
    <!-- Wood plank lines -->
    <g stroke="#991b1b" stroke-width="0.4" opacity="0.3">
      <line x1="8" y1="2.5" x2="8" y2="7.5"/>
      <line x1="14" y1="2.5" x2="14" y2="7.5"/>
      <line x1="20" y1="2.5" x2="20" y2="7.5"/>
      <line x1="26" y1="2.5" x2="26" y2="7.5"/>
      <line x1="32" y1="2.5" x2="32" y2="7.5"/>
    </g>
    <!-- Edge outline for dark bg -->
    <rect x="2" y="2" width="36" height="6" rx="2" fill="none" stroke="#fca5a5" stroke-width="0.3" opacity="0.2"/>
  </g>
</svg>