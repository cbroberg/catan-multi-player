<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <defs>
    <!-- PLAYER_COLOR: replace #ef4444 with player color -->
    <linearGradient id="wall-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="roof-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="settle-shadow" x="-15%" y="-5%" width="130%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#settle-shadow)">
    <!-- House body -->
    <rect x="4" y="10" width="12" height="8" fill="url(#wall-light)" rx="0.5"/>
    <!-- Shadow side -->
    <rect x="10" y="10" width="6" height="8" fill="#000" opacity="0.15" rx="0.5"/>
    <!-- Roof -->
    <polygon points="2,10.5 10,3 18,10.5" fill="url(#roof-grad)" stroke="#991b1b" stroke-width="0.4"/>
    <!-- Roof ridge highlight -->
    <line x1="10" y1="3" x2="10" y2="3.5" stroke="#fca5a5" stroke-width="0.5" opacity="0.5"/>
    <!-- Door -->
    <rect x="8" y="13" width="4" height="5" rx="1" fill="#7f1d1d" opacity="0.5"/>
    <!-- Window -->
    <rect x="5.5" y="11.5" width="2" height="2" rx="0.3" fill="#fef3c7" opacity="0.6"/>
    <!-- Chimney -->
    <rect x="13" y="5" width="2" height="5.5" fill="#991b1b" rx="0.3"/>
    <!-- Outline for visibility on dark bg -->
    <polygon points="2,10.5 10,3 18,10.5" fill="none" stroke="#fca5a5" stroke-width="0.3" opacity="0.3"/>
    <rect x="4" y="10" width="12" height="8" fill="none" stroke="#fca5a5" stroke-width="0.3" opacity="0.2" rx="0.5"/>
  </g>
</svg>