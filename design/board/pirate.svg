<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 35" width="40" height="35">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2060"/>
      <stop offset="100%" stop-color="#2d1040"/>
    </linearGradient>
    <linearGradient id="sail-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a2a70"/>
      <stop offset="40%" stop-color="#7b3f9e"/>
      <stop offset="100%" stop-color="#5a2a70"/>
    </linearGradient>
    <filter id="pirate-shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#pirate-shadow)">
    <!-- Water line -->
    <ellipse cx="20" cy="30" rx="16" ry="3" fill="#1565c0" opacity="0.4"/>
    <!-- Hull -->
    <path d="M4,27 Q6,32 20,33 Q34,32 36,27 L32,22 L8,22 Z" fill="url(#hull)" stroke="#1a0a28" stroke-width="0.8"/>
    <!-- Hull planks -->
    <line x1="10" y1="24" x2="30" y2="24" stroke="#3a1850" stroke-width="0.4" opacity="0.5"/>
    <line x1="8" y1="26" x2="32" y2="26" stroke="#3a1850" stroke-width="0.4" opacity="0.5"/>
    <line x1="7" y1="28" x2="33" y2="28" stroke="#3a1850" stroke-width="0.4" opacity="0.4"/>
    <!-- Mast -->
    <rect x="19" y="3" width="2" height="22" fill="#5a4030" rx="0.5"/>
    <!-- Sail -->
    <path d="M21,5 Q30,10 28,18 L21,18 Z" fill="url(#sail-grad)" stroke="#3a1850" stroke-width="0.5"/>
    <!-- Skull on sail -->
    <g transform="translate(23,10)" opacity="0.6">
      <circle cx="0" cy="0" r="2.5" fill="#e0d0e8"/>
      <circle cx="-0.8" cy="-0.3" r="0.6" fill="#2d1040"/>
      <circle cx="0.8" cy="-0.3" r="0.6" fill="#2d1040"/>
      <path d="M-1,1.2 L-0.5,1 L0,1.3 L0.5,1 L1,1.2" fill="none" stroke="#2d1040" stroke-width="0.4"/>
    </g>
    <!-- Crow's nest -->
    <rect x="16" y="2" width="8" height="1.5" rx="0.5" fill="#5a4030"/>
    <!-- Flag -->
    <path d="M21,2 L21,0 L28,1 L21,2" fill="#2d1040"/>
    <!-- Bow sprit -->
    <line x1="8" y1="22" x2="2" y2="18" stroke="#5a4030" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Porthole -->
    <circle cx="14" cy="25" r="1.2" fill="#1a0a28" stroke="#3a1850" stroke-width="0.4"/>
    <circle cx="26" cy="25" r="1.2" fill="#1a0a28" stroke="#3a1850" stroke-width="0.4"/>
  </g>
</svg>