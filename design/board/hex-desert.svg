<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="100" height="115">
  <defs>
    <linearGradient id="desert-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="50%" stop-color="#e8d5b0"/>
      <stop offset="100%" stop-color="#d4c49a"/>
    </linearGradient>
    <pattern id="sand-dots" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="none"/>
      <circle cx="2" cy="3" r="0.4" fill="#c4a870" opacity="0.4"/>
      <circle cx="7" cy="6" r="0.3" fill="#c4a870" opacity="0.3"/>
      <circle cx="5" cy="9" r="0.35" fill="#c4a870" opacity="0.35"/>
      <circle cx="9" cy="1" r="0.3" fill="#c4a870" opacity="0.3"/>
    </pattern>
  </defs>
  <!-- Hex shape -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="url(#desert-bg)" stroke="#b8a47a" stroke-width="1.5"/>
  <!-- Sand texture -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="url(#sand-dots)"/>
  <!-- Sand dunes -->
  <path d="M15,52 Q30,40 48,46 Q60,40 82,48" fill="#dcc8a0" opacity="0.5"/>
  <path d="M15,52 Q30,40 48,46 Q60,40 82,48" fill="none" stroke="#c4a870" stroke-width="0.8" opacity="0.4"/>
  <path d="M20,60 Q42,50 58,54 Q72,50 85,56" fill="#d4bc95" opacity="0.4"/>
  <path d="M20,60 Q42,50 58,54 Q72,50 85,56" fill="none" stroke="#c4a870" stroke-width="0.6" opacity="0.3"/>
  <!-- Wind lines -->
  <g opacity="0.2" stroke="#b8a47a" stroke-width="0.5">
    <path d="M25,35 Q35,33 42,35" fill="none"/>
    <path d="M55,30 Q62,28 68,30" fill="none"/>
    <path d="M35,65 Q45,63 52,65" fill="none"/>
  </g>
  <!-- Cracked earth detail -->
  <g opacity="0.15" stroke="#a08860" stroke-width="0.6" fill="none">
    <path d="M45,38 L48,35 L52,37"/>
    <path d="M48,35 L49,31"/>
    <path d="M60,55 L63,52 L66,54"/>
    <path d="M63,52 L64,49"/>
  </g>
  <!-- Small stones -->
  <circle cx="30" cy="55" r="1.2" fill="#b8a47a" opacity="0.3"/>
  <circle cx="65" cy="48" r="0.9" fill="#b8a47a" opacity="0.25"/>
  <circle cx="50" cy="62" r="1" fill="#b8a47a" opacity="0.2"/>
  <!-- Edge softening -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="none" stroke="#0e1a2e" stroke-width="0.5" opacity="0.3"/>
</svg>