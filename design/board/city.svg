<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <defs>
    <!-- PLAYER_COLOR: replace #ef4444 with player color -->
    <linearGradient id="city-wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="city-roof" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="tower-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="city-shadow" x="-10%" y="-5%" width="125%" height="125%">
      <feDropShadow dx="0.5" dy="1.2" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#city-shadow)">
    <!-- Main building body -->
    <rect x="7" y="12" width="14" height="11" fill="url(#city-wall)" rx="0.5"/>
    <rect x="14" y="12" width="7" height="11" fill="#000" opacity="0.15" rx="0.5"/>
    <!-- Main roof -->
    <polygon points="5,12.5 14,6 23,12.5" fill="url(#city-roof)" stroke="#991b1b" stroke-width="0.4"/>
    <!-- Tower -->
    <rect x="2" y="7" width="7" height="16" fill="url(#tower-grad)" rx="0.5"/>
    <rect x="5.5" y="7" width="3.5" height="16" fill="#000" opacity="0.12" rx="0.5"/>
    <!-- Tower roof (pointed) -->
    <polygon points="1,7.5 5.5,1 10,7.5" fill="url(#city-roof)" stroke="#991b1b" stroke-width="0.4"/>
    <!-- Tower windows -->
    <rect x="3.5" y="9" width="2" height="2.5" rx="0.5" fill="#fef3c7" opacity="0.5"/>
    <rect x="3.5" y="14" width="2" height="2" rx="0.3" fill="#fef3c7" opacity="0.4"/>
    <!-- Main building windows -->
    <rect x="9" y="13.5" width="2" height="2" rx="0.3" fill="#fef3c7" opacity="0.5"/>
    <rect x="15" y="13.5" width="2" height="2" rx="0.3" fill="#fef3c7" opacity="0.4"/>
    <!-- Main door -->
    <rect x="12" y="18" width="4" height="5" rx="1.2" fill="#7f1d1d" opacity="0.5"/>
    <!-- Tower flag pole -->
    <line x1="5.5" y1="1" x2="5.5" y2="-1" stroke="#991b1b" stroke-width="0.5"/>
    <!-- Battlements on tower -->
    <g fill="#b91c1c">
      <rect x="2" y="6" width="1.5" height="2" rx="0.2"/>
      <rect x="5" y="6" width="1.5" height="2" rx="0.2"/>
      <rect x="8" y="6" width="1.5" height="2" rx="0.2"/>
    </g>
    <!-- Subtle outlines for dark bg visibility -->
    <rect x="2" y="7" width="7" height="16" fill="none" stroke="#fca5a5" stroke-width="0.2" opacity="0.25" rx="0.5"/>
    <rect x="7" y="12" width="14" height="11" fill="none" stroke="#fca5a5" stroke-width="0.2" opacity="0.2" rx="0.5"/>
  </g>
</svg>