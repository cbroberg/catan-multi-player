<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="100" height="115">
  <defs>
    <linearGradient id="fields-bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#fdd835"/>
      <stop offset="50%" stop-color="#f9c826"/>
      <stop offset="100%" stop-color="#e8b520"/>
    </linearGradient>
    <pattern id="wheat-rows" patternUnits="userSpaceOnUse" width="8" height="20">
      <rect width="8" height="20" fill="none"/>
      <line x1="4" y1="20" x2="4" y2="4" stroke="#c8960a" stroke-width="0.6" opacity="0.3"/>
      <line x1="4" y1="20" x2="3" y2="3" stroke="#c8960a" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Hex shape -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="url(#fields-bg)" stroke="#c89b18" stroke-width="1.5"/>
  <!-- Row pattern -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="url(#wheat-rows)"/>
  <!-- Wheat stalks group 1 -->
  <g opacity="0.7">
    <line x1="25" y1="55" x2="24" y2="28" stroke="#b8880a" stroke-width="0.8"/>
    <ellipse cx="23.5" cy="27" rx="2" ry="4" fill="#daa520" transform="rotate(-5,23.5,27)"/>
    <line x1="30" y1="56" x2="31" y2="25" stroke="#b8880a" stroke-width="0.8"/>
    <ellipse cx="31.5" cy="24" rx="2" ry="4" fill="#daa520" transform="rotate(3,31.5,24)"/>
    <line x1="35" y1="54" x2="34" y2="30" stroke="#b8880a" stroke-width="0.8"/>
    <ellipse cx="33.5" cy="29" rx="1.8" ry="3.5" fill="#d4a017" transform="rotate(-2,33.5,29)"/>
  </g>
  <!-- Wheat stalks group 2 -->
  <g opacity="0.65">
    <line x1="50" y1="58" x2="49" y2="32" stroke="#b8880a" stroke-width="0.8"/>
    <ellipse cx="48.5" cy="31" rx="2" ry="4" fill="#daa520" transform="rotate(-4,48.5,31)"/>
    <line x1="55" y1="56" x2="56" y2="28" stroke="#b8880a" stroke-width="0.8"/>
    <ellipse cx="56.5" cy="27" rx="2" ry="4" fill="#daa520" transform="rotate(5,56.5,27)"/>
    <line x1="60" y1="57" x2="59" y2="33" stroke="#b8880a" stroke-width="0.8"/>
    <ellipse cx="58.5" cy="32" rx="1.8" ry="3.5" fill="#d4a017" transform="rotate(-3,58.5,32)"/>
  </g>
  <!-- Wheat stalks group 3 -->
  <g opacity="0.55">
    <line x1="42" y1="48" x2="41" y2="20" stroke="#b8880a" stroke-width="0.7"/>
    <ellipse cx="40.5" cy="19" rx="1.8" ry="3.5" fill="#c89b18" transform="rotate(-6,40.5,19)"/>
    <line x1="70" y1="50" x2="71" y2="26" stroke="#b8880a" stroke-width="0.7"/>
    <ellipse cx="71.5" cy="25" rx="1.8" ry="3.5" fill="#c89b18" transform="rotate(4,71.5,25)"/>
  </g>
  <!-- Waving motion hint -->
  <path d="M20,42 Q35,38 50,42 Q65,46 80,42" stroke="#c89b18" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Edge softening -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="none" stroke="#0e1a2e" stroke-width="0.5" opacity="0.3"/>
</svg>