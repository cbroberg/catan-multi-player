<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="100" height="115">
  <defs>
    <linearGradient id="hills-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#d4852e"/>
      <stop offset="50%" stop-color="#c07028"/>
      <stop offset="100%" stop-color="#a85e20"/>
    </linearGradient>
    <pattern id="brick-pattern" patternUnits="userSpaceOnUse" width="14" height="8">
      <rect width="14" height="8" fill="none"/>
      <rect x="0" y="0" width="6" height="3.5" rx="0.3" fill="#b86e28" opacity="0.3" stroke="#8b5a1e" stroke-width="0.3"/>
      <rect x="7" y="0" width="6" height="3.5" rx="0.3" fill="#c47830" opacity="0.3" stroke="#8b5a1e" stroke-width="0.3"/>
      <rect x="3.5" y="4" width="6" height="3.5" rx="0.3" fill="#b86e28" opacity="0.3" stroke="#8b5a1e" stroke-width="0.3"/>
      <rect x="10.5" y="4" width="3" height="3.5" rx="0.3" fill="#c47830" opacity="0.25" stroke="#8b5a1e" stroke-width="0.3"/>
    </pattern>
  </defs>
  <!-- Hex shape -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="url(#hills-bg)" stroke="#8b5a1e" stroke-width="1.5"/>
  <!-- Brick texture overlay -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="url(#brick-pattern)"/>
  <!-- Layered hills - back -->
  <path d="M15,50 Q30,32 50,38 Q70,32 85,45" fill="#b86e28" opacity="0.5"/>
  <path d="M15,50 Q30,32 50,38 Q70,32 85,45" fill="none" stroke="#8b5a1e" stroke-width="0.8" opacity="0.4"/>
  <!-- Layered hills - front -->
  <path d="M12,60 Q35,42 55,48 Q72,42 88,55" fill="#c47830" opacity="0.4"/>
  <path d="M12,60 Q35,42 55,48 Q72,42 88,55" fill="none" stroke="#8b5a1e" stroke-width="0.6" opacity="0.3"/>
  <!-- Brick kiln / structure hint -->
  <g transform="translate(42,18)" opacity="0.5">
    <path d="M0,20 L0,8 Q8,0 16,8 L16,20 Z" fill="#a85e20" stroke="#8b4a18" stroke-width="0.8"/>
    <rect x="5" y="12" width="6" height="8" rx="1" fill="#3d1e08" opacity="0.6"/>
    <!-- Kiln opening glow -->
    <rect x="6" y="14" width="4" height="5" rx="0.5" fill="#e85a10" opacity="0.4"/>
    <!-- Smoke hint -->
    <circle cx="8" cy="4" r="2" fill="#8b5a1e" opacity="0.2"/>
    <circle cx="10" cy="1" r="1.5" fill="#8b5a1e" opacity="0.15"/>
  </g>
  <!-- Scattered clay/dirt texture -->
  <circle cx="22" cy="58" r="1.5" fill="#8b4a18" opacity="0.25"/>
  <circle cx="72" cy="52" r="1.2" fill="#8b4a18" opacity="0.2"/>
  <circle cx="35" cy="62" r="1" fill="#8b4a18" opacity="0.2"/>
  <!-- Edge softening -->
  <polygon points="50,0 93.3,14.4 93.3,72.2 50,86.6 6.7,72.2 6.7,14.4" fill="none" stroke="#0e1a2e" stroke-width="0.5" opacity="0.3"/>
</svg>